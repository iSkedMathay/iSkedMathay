<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | iSkedMathay</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* ✅ BACKGROUND IMAGE + GRADIENT OVERLAY */
      background:
        linear-gradient(
          rgba(255, 120, 150, 0.6),
          rgba(255, 180, 100, 0.6)
        ),
        url("IMSHS.png"); /* 🔁 palitan mo ng image mo */
      background-size: cover;
      background-position: center;

      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .container {
      background: white;
      color: #333;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 350px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      background: linear-gradient(to right, #ff5f6d, #d82cff);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .google-btn {
      margin-top: 10px;
      background: #4285f4;
    }

    .signup-link {
      margin-top: 15px;
      display: block;
      font-size: 14px;
      color: #000000;
      text-decoration: none;
      font-weight: 600;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.opacity = "1";
    });
  </script>
</head>

<body>
  <div class="container">
    <h2>Login to iSkedMathay</h2>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <button id="googleBtn" class="google-btn">Sign in with Google</button>

    <a href="sign-up.html" class="signup-link">
      Don’t have an account? Create one
    </a>

    <a href="#" id="forgotPassword"
       style="display:block;margin-top:10px;font-size:14px;color:#000000;font-weight:600;text-decoration:none;">
      Forgot password?
    </a>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig } from "./firebase-config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  async function ensureUserDoc(user) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      await setDoc(ref, {
        email: user.email,
        role: null,
        createdAt: new Date()
      });
    }
  }

  document.getElementById("forgotPassword").addEventListener("click", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) {
      alert("Please enter your email first.");
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      alert("Password reset link sent to your email.");
    } catch (err) {
      alert(err.message);
    }
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter email and password.");
      return;
    }

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await ensureUserDoc(cred.user);
      window.location.href = "account-type.html";
    } catch (err) {
      alert("Login failed: " + err.message);
    }
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      const cred = await signInWithPopup(auth, provider);
      await ensureUserDoc(cred.user);
      window.location.href = "account-type.html";
    } catch (err) {
      alert("Google sign-in failed: " + err.message);
    }
  });
</script>
</body>
</html>
